name: CI

on:
  push:
    branches: [ main, feat/** ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend - Testes e Cobertura
    runs-on: ubuntu-latest
    
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'" --health-interval=10s --health-timeout=5s --health-retries=5
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências do backend
        working-directory: ./backend
        run: npm ci

      - name: Rodar testes do backend
        working-directory: ./backend
        env:
          MONGODB_URI: mongodb://localhost:27017/fiap_tech_challenge_test
          JWT_SECRET: test-secret-key
        run: npm test -- --coverage

      - name: Verificar cobertura mínima
        working-directory: ./backend
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "✅ Testes executados com cobertura"
          fi

  frontend-build:
    name: Frontend - Build e Validação
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências do frontend
        working-directory: ./frontend
        run: npm ci

      - name: Build do frontend
        working-directory: ./frontend
        env:
          CI: false
        run: npm run build

      - name: Verificar build
        working-directory: ./frontend
        run: |
          if [ -d build ]; then
            echo "✅ Build do frontend criado com sucesso"
            ls -lh build/
          else
            echo "❌ Falha no build do frontend"
            exit 1
          fi

  docker-validation:
    name: Docker - Validação de Containers
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar Dockerfiles
        run: |
          echo "Verificando Dockerfile do backend..."
          if [ -f backend/Dockerfile ]; then
            echo "✅ backend/Dockerfile encontrado"
          else
            echo "❌ backend/Dockerfile não encontrado"
            exit 1
          fi
          
          echo "Verificando Dockerfile do frontend..."
          if [ -f frontend/Dockerfile ]; then
            echo "✅ frontend/Dockerfile encontrado"
          else
            echo "❌ frontend/Dockerfile não encontrado"
            exit 1
          fi
          
          echo "Verificando docker-compose.yml..."
          if [ -f docker-compose.yml ]; then
            echo "✅ docker-compose.yml encontrado"
          else
            echo "❌ docker-compose.yml não encontrado"
            exit 1
          fi

      - name: Validar docker-compose.yml
        run: |
          docker compose config --quiet
          echo "✅ docker-compose.yml é válido"

