version: '3.8'
services:
  backend:
    build: ./backend
    container_name: tech-challenge-backend
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017/fiap_tech_challenge
      - PORT=3000
      - JWT_SECRET=tech-challenge-secret-key-change-in-production
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: tech-challenge-frontend
    ports:
      - '3001:3000'
    environment:
      - REACT_APP_API_URL=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped
    stdin_open: true
    tty: true

  mobile:
    build: ./mobile
    container_name: tech-challenge-mobile
    ports:
      - '8081:8081'
      - '19000:19000'
      - '19001:19001'
    environment:
      # HOST_IP: IP da sua máquina na rede local (ex: 192.168.1.10)
      # Necessário para que o Expo Go no celular alcance o servidor
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_IP:-localhost}
      - EXPO_PUBLIC_API_URL=http://${HOST_IP:-localhost}:3000
    volumes:
      - ./mobile:/app
      - mobile_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    stdin_open: true
    tty: true

  mongo:
    image: mongo:6.0
    container_name: tech-challenge-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  mobile_node_modules:
